<svg viewBox="0 0 64 64" width="64" height="64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background panel -->
  <rect width="64" height="64" rx="14" fill="#080c14"/>

  <!-- Shield outline — cyber protection -->
  <path d="M32 6L10 16V34C10 46 20 55 32 58C44 55 54 46 54 34V16L32 6Z"
    fill="url(#shield-fill)" stroke="url(#shield-stroke)" stroke-width="1.2"/>

  <!-- Neural nodes — 6 hexagonal points forming a brain-like cluster -->
  <circle cx="32" cy="24" r="3.5" fill="url(#node-center)"/>
  <circle cx="22" cy="30" r="2.5" fill="url(#node-left)"/>
  <circle cx="42" cy="30" r="2.5" fill="url(#node-right)"/>
  <circle cx="26" cy="40" r="2" fill="url(#node-bl)"/>
  <circle cx="38" cy="40" r="2" fill="url(#node-br)"/>
  <circle cx="32" cy="46" r="2" fill="url(#node-bottom)"/>

  <!-- Neural connections -->
  <line x1="32" y1="24" x2="22" y2="30" stroke="url(#conn)" stroke-width="1.2" opacity="0.8"/>
  <line x1="32" y1="24" x2="42" y2="30" stroke="url(#conn)" stroke-width="1.2" opacity="0.8"/>
  <line x1="22" y1="30" x2="26" y2="40" stroke="url(#conn)" stroke-width="1" opacity="0.6"/>
  <line x1="42" y1="30" x2="38" y2="40" stroke="url(#conn)" stroke-width="1" opacity="0.6"/>
  <line x1="26" y1="40" x2="32" y2="46" stroke="url(#conn)" stroke-width="1" opacity="0.5"/>
  <line x1="38" y1="40" x2="32" y2="46" stroke="url(#conn)" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="30" x2="42" y2="30" stroke="url(#conn)" stroke-width="0.8" opacity="0.4"/>
  <line x1="26" y1="40" x2="38" y2="40" stroke="url(#conn)" stroke-width="0.8" opacity="0.4"/>

  <!-- Center glow pulse -->
  <circle cx="32" cy="24" r="6" fill="url(#center-glow)" opacity="0.3"/>

  <defs>
    <linearGradient id="shield-fill" x1="10" y1="6" x2="54" y2="58">
      <stop stop-color="#0a1628" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#060a12" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="shield-stroke" x1="10" y1="6" x2="54" y2="58">
      <stop stop-color="#00FFFF" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#7B5FFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#D26BFF" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="node-center" cx="0.5" cy="0.3" r="0.8">
      <stop stop-color="#00FFFF"/>
      <stop offset="1" stop-color="#7B5FFF"/>
    </radialGradient>
    <radialGradient id="node-left" cx="0.5" cy="0.5" r="0.8">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#5B4FFF"/>
    </radialGradient>
    <radialGradient id="node-right" cx="0.5" cy="0.5" r="0.8">
      <stop stop-color="#A78BFF"/>
      <stop offset="1" stop-color="#D26BFF"/>
    </radialGradient>
    <radialGradient id="node-bl" cx="0.5" cy="0.5" r="0.8">
      <stop stop-color="#00CFFF"/>
      <stop offset="1" stop-color="#6B5FFF"/>
    </radialGradient>
    <radialGradient id="node-br" cx="0.5" cy="0.5" r="0.8">
      <stop stop-color="#C084FF"/>
      <stop offset="1" stop-color="#8A2BE2"/>
    </radialGradient>
    <radialGradient id="node-bottom" cx="0.5" cy="0.5" r="0.8">
      <stop stop-color="#7B5FFF"/>
      <stop offset="1" stop-color="#D26BFF"/>
    </radialGradient>
    <linearGradient id="conn" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFFF"/>
      <stop offset="1" stop-color="#8A2BE2"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#00FFFF"/>
      <stop offset="1" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
